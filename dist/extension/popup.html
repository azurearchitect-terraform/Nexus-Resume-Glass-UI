<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    h3 { margin-top: 0; color: #10b981; }
    textarea { width: 100%; height: 150px; margin-bottom: 10px; font-family: monospace; font-size: 11px; padding: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #10b981; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: #059669; }
    #status { margin-top: 10px; font-size: 12px; color: #666; text-align: center; }
  </style>
</head>
<body>
  <h3>Nexus AI Autofill</h3>
  <p style="font-size: 12px; color: #666;">Paste your JSON payload from the Nexus AI dashboard here:</p>
  <textarea id="payload" placeholder='{"firstName": "John", ...}'></textarea>
  <button id="autofillBtn">Autofill Current Page</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
